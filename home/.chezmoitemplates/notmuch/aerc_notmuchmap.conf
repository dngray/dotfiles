{{- $maildirs := .maildirs -}}
{{- $folders := list "Inbox" "Sent" "Archive" -}}

# RECENT
Recent=date:30days..today and not (
{{- range $index, $dir := $maildirs -}}
  {{- if $index }} or {{ end }}path:{{ $dir }}/Spam/**
{{- end -}})

# THREADED INBOX
InboxThreaded=thread:"{
{{- range $index, $dir := $maildirs -}}
  {{- if $index }} or {{ end }}path:{{ $dir }}/Inbox/**
{{- end -}}"

# FOLDERS
{{ range $folder := $folders -}}
{{ $folder }}=
  {{- range $index, $dir := $maildirs -}}
    {{- if $index }} or {{ end }}path:{{ $dir }}/{{ $folder }}/**
  {{- end -}}
  {{- if eq $folder "Archive" }} or path:oldmail/**{{ end }}
{{ end -}}
