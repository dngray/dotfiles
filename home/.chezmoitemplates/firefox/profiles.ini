{{- if not .global.state.headless -}}

{{- /* Resolve the Firefox Binary Installation Hash based on OS and Install Type */ -}}
{{- $releaseId := "0" -}}

{{- if eq .global.chezmoi.os "windows" -}}
{{-   $releaseId = mozillaInstallHash "C:\\Program Files\\Mozilla Firefox" -}}
{{- else if eq .global.chezmoi.os "darwin" -}}
{{-   $releaseId = mozillaInstallHash "/Applications/Firefox.app/Contents/MacOS" -}}
{{- else if eq .global.chezmoi.os "linux" -}}
{{-   if eq .installType "package" -}}
{{-     if eq .global.chezmoi.osRelease.id "fedora" -}}
{{-       $releaseId = mozillaInstallHash "/usr/lib64/firefox" -}}
{{-     else if eq .global.chezmoi.osRelease.id "arch" -}}
{{-       $releaseId = mozillaInstallHash "/usr/lib/firefox" -}}
{{-     else if eq .global.chezmoi.osRelease.id "debian" -}}
{{-       $releaseId = mozillaInstallHash "/usr/lib/firefox-esr" -}}
{{-     end -}}
{{-   else if eq .installType "flatpak" -}}
{{-     $releaseId = mozillaInstallHash "/app/lib/firefox" -}}
{{-   else if eq .installType "snap" -}}
{{-     if eq .global.chezmoi.osRelease.id "ubuntu" -}}
{{-       $releaseId = mozillaInstallHash "/snap/firefox/current/usr/lib/firefox" -}}
{{-     end -}}
{{-   end -}}
{{- end -}}

[General]
StartWithLastProfile=1
Version=2

[Profile0]
Name=default
IsRelative=1
Path=default
Default=1

[Profile1]
Name=direct
IsRelative=1
Path=direct

[Profile2]
Name=direct-no-rfp
IsRelative=1
Path=direct-no-rfp

[Profile3]
Name=default-no-rfp
IsRelative=1
Path=default-no-rfp

[Install{{- $releaseId -}}]
Default=default
Locked=1
{{- end -}}
