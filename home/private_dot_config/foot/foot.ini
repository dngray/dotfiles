color = 11111b f5e0dc

[mouse]
# hide-when-typing=no
# alternate-scroll-mode=yes

[colors]
alpha = 0.8
foreground = cdd6f4
background = 1e1e2e

regular0 = 45475a
regular1 = f38ba8
regular2 = a6e3a1
regular3 = f9e2af
regular4 = 89b4fa
regular5 = f5c2e7
regular6 = 94e2d5
regular7 = bac2de

bright0 = 585b70
bright1 = f38ba8
bright2 = a6e3a1
bright3 = f9e2af
bright4 = 89b4fa
bright5 = f5c2e7
bright6 = 94e2d5
bright7 = a6adc8

16 = fab387
17 = f5e0dc

selection-foreground = cdd6f4
selection-background = 414356

search-box-no-match = 11111b f38ba8
search-box-match = cdd6f4 313244

jump-labels = 11111b fab387
urls = 89b4fa

## dimmed colors (see foot.ini(5) man page)
# dim0=<not set>
# ...
# dim7=<not-set>

## The remaining 256-color palette
# 16 = <256-color palette #16>
# ...
# 255 = <256-color palette #255>

## Misc colors
