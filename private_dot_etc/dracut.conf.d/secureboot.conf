# /etc/dracut.conf.d/secureboot.conf
# Force dracut into fallback generation mode for systemd-ukify assembly

# CRITICAL OVERRIDE: Tells dracut to NOT build a UKI; ukify will package it instead
uefi="no"
hostonly="no"
hostonly_cmdline="no"
compress="lz4"

# Enable hardware cryptographic tokens if present
add_dracutmodules+=" tpm2-tss "
omit_dracutmodules+=" brltty "
